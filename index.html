<title>家計簿</title>
<style>
  :root{
    --bg:#F6F4EF;
    --ink:#22281F;
    --ink-soft:#6B7263;
    --line:#E1DDD2;
    --card:#FFFFFF;
    --income:#3E7A5C;
    --income-bg:#E7F1EA;
    --expense:#B5533D;
    --expense-bg:#F7E9E4;
    --calendar-income:#4E9FC3;
    --calendar-expense:#C94D4D;
    --saturday:#397DB5;
    --holiday:#C94D4D;
    --accent:#22281F;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
  }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    height:100dvh;
    min-height:0;
  }
  .wrap{
    width:100%;
    height:100%;
    max-width:480px;
    margin:0 auto;
    padding:
      calc(env(safe-area-inset-top, 0px) + 14px)
      max(16px, env(safe-area-inset-right, 0px))
      0
      max(16px, env(safe-area-inset-left, 0px));
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* Header */
  header{
    padding-top:0;
    margin-bottom:18px;
    flex:0 0 auto;
  }
  .header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
    min-height:44px;
  }
  header h1{
    font-size:14px;
    font-weight:600;
    letter-spacing:.12em;
    color:var(--ink-soft);
    margin:0;
    text-transform:uppercase;
  }
  #settingsBtn{
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
    padding:0;
    color:var(--ink);
    width:44px;
    height:44px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    touch-action:manipulation;
  }
  #settingsBtn:active{background:var(--line);}

  .balances{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
  }
  .balance-card{
    background:var(--card);
    border-radius:var(--radius);
    padding:14px 12px;
    border:1px solid var(--line);
    min-width:0;
  }
  .balance-card .label{
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-weight:600;
  }
  .balance-card .amount{
    font-size:clamp(13px,4.35vw,18px);
    font-weight:700;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.01em;
    white-space:nowrap;
  }
  .balance-card.bank{background:#222820;border:1px solid #222820;}
  .balance-card.bank .label{color:#B9C2AE;}
  .balance-card.bank .amount{color:#fff;}

  /* View switch */
  .view-switch{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    margin:16px 0 12px;
    background:var(--line);
    padding:4px;
    border-radius:12px;
    flex:0 0 auto;
  }
  .view-switch button{
    border:none;
    background:transparent;
    padding:9px 0;
    border-radius:9px;
    font-size:13.5px;
    font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .view-switch button.active{
    background:var(--card);
    color:var(--ink);
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }

  /* Filter tabs */
  .tabs{
    display:flex;
    flex:0 0 auto;
    gap:6px;
    margin:0 0 12px;
    overflow-x:auto;
  }
  .tab{
    flex:0 0 auto;
    padding:7px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    background:transparent;
    border:1px solid var(--line);
    cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }

  #listView,
  #calendarView{
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
    flex-direction:column;
  }
  #listView{display:flex;}
  #list,
  #monthList{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    overflow-x:hidden;
    overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    padding-bottom:calc(88px + env(safe-area-inset-bottom, 0px));
  }

  /* Transaction list */
  .day-group{margin-bottom:4px;}
  .day-label{
    font-size:12px;
    color:var(--ink-soft);
    padding:14px 2px 6px;
    font-weight:600;
  }
  .day-label.saturday{color:var(--saturday);}
  .day-label.holiday{color:var(--holiday);}
  .tx{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:13px 14px;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition:background .1s;
  }
  .tx:active{background:#f9f7f2;}
  .tx-icon{
    width:38px;height:38px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;
    flex-shrink:0;
  }
  .tx.income .tx-icon{background:var(--income-bg);}
  .tx.expense .tx-icon{background:var(--expense-bg);}
  .tx-main{flex:1;min-width:0;}
  .tx-place{font-size:14.5px;font-weight:600;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;
    display:flex;gap:6px;align-items:center;}
  .tx-source{
    font-size:10.5px;
    padding:1px 6px;
    border-radius:6px;
    background:var(--bg);
    color:var(--ink-soft);
  }
  .tx-amount{
    font-size:15px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    flex-shrink:0;
  }
  .tx.income .tx-amount{color:var(--income);}
  .tx.expense .tx-amount{color:var(--expense);}

  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:13.5px;
    padding:60px 20px;
    line-height:1.8;
  }

  /* Month folders */
  .month-folder{
    margin-bottom:10px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--card);
    overflow:hidden;
  }
  .month-folder summary{
    list-style:none;
    display:flex;
    align-items:center;
    gap:10px;
    padding:13px 14px;
    cursor:pointer;
    font-size:14px;
    font-weight:700;
  }
  .month-folder summary::-webkit-details-marker{display:none;}
  .month-folder summary::before{
    content:"";
    width:20px;
    height:14px;
    border-radius:3px;
    background:#D8B55B;
    box-shadow:inset 0 0 0 1px rgba(91,70,18,.12);
    flex-shrink:0;
  }
  .month-folder summary::after{
    content:"›";
    margin-left:auto;
    color:var(--ink-soft);
    font-size:18px;
    transform:rotate(0deg);
    transition:transform .15s;
  }
  .month-folder[open] summary::after{transform:rotate(90deg);}
  .month-count{font-size:11px;font-weight:600;color:var(--ink-soft);}
  .month-folder-body{padding:0 10px 4px;border-top:1px solid var(--line);}
  .month-folder-body .tx{border-left:0;border-right:0;border-radius:10px;}

  /* Calendar */
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    flex:0 0 auto;
  }
  .cal-nav{
    width:30px;height:30px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font-size:14px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .cal-title{font-size:13.5px;font-weight:700;}
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:3px;
    margin-bottom:12px;
    flex:0 0 auto;
  }
  .cal-wd{
    text-align:center;
    font-size:9.5px;
    color:var(--ink-soft);
    font-weight:700;
    padding-bottom:2px;
  }
  .cal-wd.sunday{color:var(--holiday);}
  .cal-wd.saturday{color:var(--saturday);}
  .cal-cell{
    aspect-ratio:1/0.88;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--card);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:2px;
    gap:0.5px;
  }
  .cal-cell.empty-cell{visibility:hidden; cursor:default;}
  .cal-cell .d{font-size:10px;font-weight:600;color:var(--ink);}
  .cal-cell.saturday .d{color:var(--saturday);}
  .cal-cell.holiday .d{color:var(--holiday);}
  .cal-cell .day-amounts{
    min-height:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-variant-numeric:tabular-nums;
    line-height:1;
  }
  .cal-cell .net{font-size:7.5px;font-weight:700;white-space:nowrap;}
  .cal-cell .net.plus{color:var(--calendar-income);transform:translateY(-1px);}
  .cal-cell .net.minus{color:var(--calendar-expense);transform:translateY(1px);}
  .cal-cell.today{border-color:var(--ink); border-width:1.5px;}
  .cal-cell.selected{border-color:var(--ink); border-width:2px;}

  .month-list-label{
    font-size:12px;
    color:var(--ink-soft);

</style>

<body>

<button class="fab" id="openAdd" aria-label="記録を追加">＋</button>

<!-- Add/Edit Modal -->

<!-- Settings Modal -->

      <div class="settings-menu">

      <button class="utility-btn" id="exportBackupBtn" type="button">バックアップを書き出す</button>
      <button class="utility-btn" id="importBackupBtn" type="button">バックアップから復元</button>

<script>
const APP_VERSION = document.querySelector('meta[name="app-version"]').content;
const STORAGE_KEY = 'kakeibo_transactions_v1';
const BALANCE_KEY = 'kakeibo_balances_v1';
let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let balances = JSON.parse(localStorage.getItem(BALANCE_KEY) || '{"totalInitial":0,"bankInitial":0}');
let currentType = 'expense';
let currentSource = 'cash';
let activeFilter = 'all';
let viewMode = 'list';
let calMonth = new Date(); calMonth.setDate(1);
let selectedDate = null;
let editingTxId = null;
let lastUpdateCheck = 0;

async function checkForAppUpdate(){
  if(location.protocol === 'file:' || !navigator.onLine) return;
  if(document.querySelector('.overlay.open')) return;
  const now = Date.now();
  if(now - lastUpdateCheck < 60000) return;
  lastUpdateCheck = now;

  try{
    const updateUrl = new URL(location.href);
    updateUrl.searchParams.set('_update', String(now));
    const response = await fetch(updateUrl, {cache:'no-store'});
    if(!response.ok) return;
    const latestHtml = await response.text();
    const latestDocument = new DOMParser().parseFromString(latestHtml, 'text/html');
    const latestVersion = latestDocument.querySelector('meta[name="app-version"]')?.content;
    if(!latestVersion || latestVersion === APP_VERSION) return;

    const nextUrl = new URL(location.href);
    nextUrl.search = '';
    nextUrl.searchParams.set('v', latestVersion);
    location.replace(nextUrl.href);
  } catch(error){
    // オフライン時などは現在の画面をそのまま利用する。
  }
}

const yen = n => '¥' + Math.round(n).toLocaleString('ja-JP');
function localDateStr(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
const todayStr = () => localDateStr(new Date());

const holidayCache = new Map();
function nthMonday(year, monthIndex, nth){
  const first = new Date(year, monthIndex, 1);
  return 1 + ((8 - first.getDay()) % 7) + (nth - 1) * 7;
}
function equinoxDay(year, autumn = false){
  const base = autumn ? 23.2488 : 20.8431;
  return Math.floor(base + 0.242194 * (year - 1980) - Math.floor((year - 1980) / 4));
}
function japaneseHolidays(year){
  if(holidayCache.has(year)) return holidayCache.get(year);
  const holidays = new Set();
  const originalHolidays = new Set();
  const add = (month, day) => {
    const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    holidays.add(key);
    originalHolidays.add(key);
  };

  add(1, 1);
  add(1, nthMonday(year, 0, 2));
  add(2, 11);
  if(year >= 2020) add(2, 23);
  add(3, equinoxDay(year));
  add(4, 29);
  add(5, 3); add(5, 4); add(5, 5);

  if(year === 2020){ add(7, 23); add(7, 24); add(8, 10); }
  else if(year === 2021){ add(7, 22); add(7, 23); add(8, 8); }
  else {
    add(7, nthMonday(year, 6, 3));
    if(year >= 2016) add(8, 11);
    add(10, nthMonday(year, 9, 2));
  }
  add(9, nthMonday(year, 8, 3));
  add(9, equinoxDay(year, true));
  add(11, 3); add(11, 23);
  if(year <= 2018) add(12, 23);
  if(year === 2019){ add(5, 1); add(10, 22); }

  // 国民の祝日に挟まれた平日を「国民の休日」にする。
  for(let month=0; month<12; month++){
    const days = new Date(year, month + 1, 0).getDate();
    for(let day=2; day<days; day++){
      const current = localDateStr(new Date(year, month, day));
      const previous = localDateStr(new Date(year, month, day - 1));
      const next = localDateStr(new Date(year, month, day + 1));
      if(!holidays.has(current) && holidays.has(previous) && holidays.has(next)) holidays.add(current);
    }
  }

  // 日曜の祝日の次の平日を振替休日にする。
  originalHolidays.forEach(key => {
    const holiday = new Date(key + 'T00:00:00');
    if(holiday.getDay() !== 0) return;
    const substitute = new Date(holiday);
    do { substitute.setDate(substitute.getDate() + 1); }
    while(holidays.has(localDateStr(substitute)));
    holidays.add(localDateStr(substitute));
  });

  holidayCache.set(year, holidays);
  return holidays;
}
function dateToneClass(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  if(d.getDay() === 0 || japaneseHolidays(d.getFullYear()).has(dateStr)) return 'holiday';
  if(d.getDay() === 6) return 'saturday';
  return '';
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
}

function computeBalances(){
  let total = balances.totalInitial || 0;
  let bank = balances.bankInitial || 0;
  transactions.forEach(t=>{
    if(t.type === 'income'){
      total += t.amount;
      if(t.source === 'bank') bank += t.amount;
    } else if(t.type === 'expense'){
      total -= t.amount;
      if(t.source === 'bank') bank -= t.amount;
    }
  });
  return {total, bank, cash: total - bank};
}

function fmtDateLabel(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((today - d) / 86400000);
  const md = `${d.getMonth()+1}月${d.getDate()}日`;
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  if(diffDays === 0) return `今日・${md}（${wd}）`;
  if(diffDays === 1) return `昨日・${md}（${wd}）`;
  return `${md}（${wd}）`;
}

const ICONS = {income:'💰', expense:'🧾'};

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderTxRow(t){
  const sign = t.type === 'income' ? '+' : '−';
  const sourceLabel = t.source === 'bank' ? '銀行' : '現金';
  return `
    <div class="tx ${t.type}" data-tx-id="${t.id}">
      <div class="tx-icon">${ICONS[t.type]}</div>
      <div class="tx-main">
        <div class="tx-place">${escapeHtml(t.place)}</div>
        <div class="tx-meta"><span class="tx-source">${sourceLabel}</span></div>
      </div>
      <div class="tx-amount">${sign}${yen(t.amount)}</div>
    </div>`;
}

function bindTxClickHandlers(root){
  root.querySelectorAll('.tx').forEach(row=>{
    row.addEventListener('click', e=>{
      const txId = Number(row.dataset.txId);
      editingTxId = txId;
      const tx = transactions.find(t => t.id === txId);
      if(tx) loadEditModal(tx);
    });
  });
}

function loadEditModal(tx){
  document.getElementById('modalTitle').textContent = '記録を編集';
  document.getElementById('dateInput').value = tx.date;
  document.getElementById('placeInput').value = tx.place;
  document.getElementById('amountInput').value = tx.amount;
  setType(tx.type);
  currentSource = tx.source || 'cash';
  updateSourceButtons();
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('placeInput').focus(), 200);
}

function renderList(){
  const list = document.getElementById('list');
  let items = transactions.slice().sort((a,b)=> b.date.localeCompare(a.date) || b.id - a.id);
  if(activeFilter !== 'all'){
    items = items.filter(t => t.type === activeFilter);
  }

  if(items.length === 0){
    list.innerHTML = `<div class="empty">まだ記録がありません。<br>右下の「＋」から最初の記録を追加しましょう。</div>`;
    return;
  }

  const groups = new Map();
  items.forEach(t => {
    const monthKey = t.date.slice(0, 7);
    if(!groups.has(monthKey)) groups.set(monthKey, []);
    groups.get(monthKey).push(t);
  });

  const currentMonthKey = todayStr().slice(0, 7);
  let html = '';
  groups.forEach((monthItems, monthKey) => {
    const [year, month] = monthKey.split('-').map(Number);
    const isCurrentMonth = monthKey === currentMonthKey;
    html += `<details class="month-folder" ${isCurrentMonth ? 'open' : ''}>
      <summary><span>${year}年${month}月</span><span class="month-count">${monthItems.length}件</span></summary>
      <div class="month-folder-body">`;
    let lastDate = null;
    monthItems.forEach(t => {
      if(t.date !== lastDate){
        html += `<div class="day-label ${dateToneClass(t.date)}">${fmtDateLabel(t.date)}</div>`;
        lastDate = t.date;
      }
      html += renderTxRow(t);
    });
    html += `</div></details>`;
  });
  list.innerHTML = html;
  bindTxClickHandlers(list);
}

function dailyTotals(dateStr){
  let income = 0;
  let expense = 0;
  transactions.forEach(t=>{
    if(t.date !== dateStr) return;
    if(t.type === 'income') income += t.amount;
    else if(t.type === 'expense') expense += t.amount;
  });
  return {income, expense};
}

function renderCalendar(){
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  document.getElementById('calTitle').textContent = `${year}年${month+1}月`;

  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const grid = document.getElementById('calGrid');

  let html = '';
  ['日','月','火','水','木','金','土'].forEach((w, index)=>{
    const tone = index === 0 ? 'sunday' : index === 6 ? 'saturday' : '';
    html += `<div class="cal-wd ${tone}">${w}</div>`;
  });
  for(let i=0;i<firstDow;i++){
    html += `<div class="cal-cell empty-cell"></div>`;
  }
  const today = todayStr();
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const totals = dailyTotals(dateStr);
    const incomeHtml = totals.income > 0
      ? `<div class="net plus">+${Math.round(totals.income).toLocaleString('ja-JP')}</div>` : '';
    const expenseHtml = totals.expense > 0
      ? `<div class="net minus">−${Math.round(totals.expense).toLocaleString('ja-JP')}</div>` : '';
    const amountsHtml = incomeHtml || expenseHtml
      ? `${incomeHtml}${expenseHtml}` : `<div class="net">&nbsp;</div>`;

    const cls = ['cal-cell'];
    const tone = dateToneClass(dateStr);
    if(tone) cls.push(tone);
    if(dateStr === today) cls.push('today');
    if(dateStr === selectedDate) cls.push('selected');

    html += `<div class="${cls.join(' ')}" data-date="${dateStr}">
      <div class="d">${d}</div>
      <div class="day-amounts">${amountsHtml}</div>
    </div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.cal-cell:not(.empty-cell)').forEach(cell=>{
    cell.addEventListener('click', ()=>{
      selectedDate = cell.dataset.date;
      renderCalendar();
      renderMonthList();
    });
  });

  renderMonthList();
}

function renderMonthList(){
  const list = document.getElementById('monthList');
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();

  let items = transactions
    .filter(t => {
      const d = new Date(t.date+'T00:00:00');
      return d.getFullYear() === year && d.getMonth() === month;
    })
    .sort((a,b)=> b.date.localeCompare(a.date) || b.id - a.id);

  if(items.length === 0){
    list.innerHTML = `<div class="empty" style="padding:20px 10px;">この月の記録はありません。</div>`;
    return;
  }

  let html = '';
  let lastDate = null;
  items.forEach(t=>{
    if(t.date !== lastDate){
      html += `<div class="day-label ${dateToneClass(t.date)}">${fmtDateLabel(t.date)}</div>`;
      lastDate = t.date;
    }
    html += renderTxRow(t);
  });
  list.innerHTML = html;
  bindTxClickHandlers(list);
}

function renderAll(){
  const b = computeBalances();
  document.getElementById('totalBalance').textContent = yen(b.total);
  document.getElementById('bankBalance').textContent = yen(b.bank);
  document.getElementById('cashBalance').textContent = yen(b.cash);
  if(viewMode === 'list') renderList();
  else renderCalendar();
}

/* View switch */
document.getElementById('viewSwitch').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  document.querySelectorAll('#viewSwitch button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  viewMode = btn.dataset.view;
  document.getElementById('listView').style.display = viewMode === 'list' ? 'flex' : 'none';
  document.getElementById('calendarView').style.display = viewMode === 'calendar' ? 'flex' : 'none';
  renderAll();
});

/* Calendar nav */
document.getElementById('calPrev').addEventListener('click', ()=>{
  calMonth.setMonth(calMonth.getMonth()-1);
  renderCalendar();
});
document.getElementById('calNext').addEventListener('click', ()=>{
  calMonth.setMonth(calMonth.getMonth()+1);
  renderCalendar();
});

/* Filter tabs */
document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderList();
});

/* Modal */
const addOverlay = document.getElementById('addOverlay');
function openModal(){
  editingTxId = null;
  document.getElementById('modalTitle').textContent = '記録を追加';
  document.getElementById('dateInput').value = todayStr();
  document.getElementById('placeInput').value = '';
  document.getElementById('amountInput').value = '';
  setType('expense');
  currentSource = 'cash';
  updateSourceButtons();
  document.getElementById('deleteBtn').style.display = 'none';
  addOverlay.classList.add('open');
  setTimeout(()=>document.getElementById('placeInput').focus(), 200);
}
function closeModal(){ addOverlay.classList.remove('open'); }
document.getElementById('openAdd').addEventListener('click', openModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
addOverlay.addEventListener('click', e=>{ if(e.target === addOverlay) closeModal(); });

function setType(type){
  currentType = type;
  document.querySelectorAll('#typeSeg button').forEach(b=>{
    b.classList.remove('active');
  });
  document.querySelector(`#typeSeg button[data-type="${type}"]`).classList.add('active');

  const placeLabel = document.getElementById('placeLabel');
  const placeInput = document.getElementById('placeInput');
  if(type === 'expense'){
    placeLabel.textContent = 'どこで（お店・内容）';
    placeInput.placeholder = '例）スーパー、コンビニ';
  } else {
    placeLabel.textContent = '内容（お給料・お小遣いなど）';
    placeInput.placeholder = '例）お給料、お小遣い';
  }
}
document.getElementById('typeSeg').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  setType(btn.dataset.type);
});

function updateSourceButtons(){
  document.querySelectorAll('#sourceRow button').forEach(b=>{
    b.classList.remove('active');
  });
  document.querySelector(`#sourceRow button[data-source="${currentSource}"]`).classList.add('active');
}
document.getElementById('sourceRow').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  currentSource = btn.dataset.source;
  updateSourceButtons();
});

document.getElementById('saveBtn').addEventListener('click', ()=>{
  const place = document.getElementById('placeInput').value.trim();
  const amount = Number(document.getElementById('amountInput').value);
  const date = document.getElementById('dateInput').value;

  if(!amount || amount <= 0){
    alert('金額を入力してください');
    return;
  }
  if(!date){
    alert('日付を選択してください');
    return;
  }
  const finalPlace = place || '（内容なし）';

  if(editingTxId){
    const idx = transactions.findIndex(t => t.id === editingTxId);
    transactions[idx] = {
      id: editingTxId,
      type: currentType,
      place: finalPlace,
      amount: amount,
      date: date,
      source: currentSource
    };
  } else {
    transactions.push({
      id: Date.now(),
      type: currentType,
      place: finalPlace,
      amount: amount,
      date: date,
      source: currentSource
    });
  }
  save();
  closeModal();
  renderAll();
});

document.getElementById('deleteBtn').addEventListener('click', ()=>{
  if(confirm('この記録を削除しますか？')){
    transactions = transactions.filter(t => t.id !== editingTxId);
    save();
    closeModal();
    renderAll();
  }
});

function createBackup(){
  return {
    app: 'kakeibo',
    formatVersion: 1,
    exportedAt: new Date().toISOString(),
    transactions,
    balances
  };
}

async function exportBackup(){
  const json = JSON.stringify(createBackup(), null, 2);
  const filename = `kakeibo-backup-${todayStr()}.json`;
  const blob = new Blob([json], {type:'application/json'});
  const file = new File([blob], filename, {type:'application/json'});

  if(navigator.share && navigator.canShare?.({files:[file]})){
    try{
      await navigator.share({
        title: '家計簿バックアップ',
        text: '家計簿の記録と残高設定のバックアップです。',
        files: [file]
      });
      return;
    } catch(error){
      if(error?.name === 'AbortError') return;
    }
  }

  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function validateBackup(data){
  if(!data || data.app !== 'kakeibo' || !Array.isArray(data.transactions)){
    throw new Error('家計簿のバックアップファイルではありません。');
  }

  const restoredTransactions = data.transactions.map((item, index)=>{
    const amount = Number(item.amount);
    const id = Number(item.id);
    if(!['income','expense'].includes(item.type) ||
       !Number.isFinite(amount) || amount <= 0 ||
       !/^\d{4}-\d{2}-\d{2}$/.test(item.date || '')){
      throw new Error(`${index + 1}件目の記録が壊れています。`);
    }
    return {
      id: Number.isFinite(id) ? id : Date.now() + index,
      type: item.type,
      place: String(item.place || '（内容なし）'),
      amount,
      date: item.date,
      source: item.source === 'bank' ? 'bank' : 'cash'
    };
  });

  const restoredBalances = data.balances || {};
  const totalInitial = Number(restoredBalances.totalInitial || 0);
  const bankInitial = Number(restoredBalances.bankInitial || 0);
  if(!Number.isFinite(totalInitial) || !Number.isFinite(bankInitial)){
    throw new Error('残高設定が壊れています。');
  }

  return {
    transactions: restoredTransactions,
    balances: {totalInitial, bankInitial}
  };
}

async function importBackup(file){
  try{
    const data = JSON.parse(await file.text());
    const restored = validateBackup(data);
    if(!confirm('現在の記録と残高設定を、バックアップの内容で置き換えますか？')) return;

    transactions = restored.transactions;
    balances = restored.balances;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
    localStorage.setItem(BALANCE_KEY, JSON.stringify(balances));
    document.getElementById('settingsOverlay').classList.remove('open');
    renderAll();
    alert('バックアップを復元しました。');
  } catch(error){
    alert(`復元できませんでした。\n${error.message || 'ファイルを確認してください。'}`);
  }
}

/* Settings */
function showSettingsPanel(panelId){
  document.querySelectorAll('#settingsOverlay .settings-panel').forEach(panel=>{
    panel.hidden = panel.id !== panelId;
  });
  document.querySelector('#settingsOverlay .sheet').scrollTop = 0;
}

document.getElementById('settingsBtn').addEventListener('click', ()=>{
  showSettingsPanel('settingsHome');
  document.getElementById('settingsOverlay').classList.add('open');
});

document.getElementById('openBalanceSettingsBtn').addEventListener('click', ()=>{
  document.getElementById('totalBalanceInput').value = balances.totalInitial || 0;
  document.getElementById('bankBalanceInput').value = balances.bankInitial || 0;
  showSettingsPanel('balanceSettingsPanel');
});

document.getElementById('openBackupSettingsBtn').addEventListener('click', ()=>{
  showSettingsPanel('backupSettingsPanel');
});

document.querySelectorAll('.settingsBackBtn').forEach(button=>{
  button.addEventListener('click', ()=>showSettingsPanel('settingsHome'));
});

document.getElementById('saveSettingsBtn').addEventListener('click', ()=>{
  const total = Number(document.getElementById('totalBalanceInput').value);
  const bank = Number(document.getElementById('bankBalanceInput').value);
  balances.totalInitial = total;
  balances.bankInitial = bank;
  localStorage.setItem(BALANCE_KEY, JSON.stringify(balances));
  document.getElementById('settingsOverlay').classList.remove('open');
  renderAll();
});

document.getElementById('exportBackupBtn').addEventListener('click', exportBackup);
document.getElementById('importBackupBtn').addEventListener('click', ()=>{
  document.getElementById('backupFileInput').click();
});
document.getElementById('backupFileInput').addEventListener('change', e=>{
  const file = e.target.files?.[0];
  e.target.value = '';
  if(file) importBackup(file);
});

document.getElementById('cancelSettingsBtn').addEventListener('click', ()=>{
  document.getElementById('settingsOverlay').classList.remove('open');
});
document.getElementById('settingsOverlay').addEventListener('click', e=>{ if(e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

selectedDate = todayStr();
renderAll();
window.addEventListener('pageshow', ()=>setTimeout(checkForAppUpdate, 800));
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') checkForAppUpdate();
});
</script>
